<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频监控平台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: #e8eaed;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== 遮罩层 ===== */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  #overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* ===== 右侧悬浮按钮 ===== */
  #fab {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 800;
    writing-mode: vertical-lr;
    letter-spacing: 4px;
    background: linear-gradient(180deg, #1a73e8 0%, #0d47a1 100%);
    color: #fff;
    border: none;
    border-radius: 8px 0 0 8px;
    padding: 18px 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: -2px 2px 12px rgba(0,0,0,.2);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: right .35s cubic-bezier(.4,0,.2,1), box-shadow .2s;
  }
  #fab:hover {
    box-shadow: -4px 4px 20px rgba(0,0,0,.3);
  }
  #fab .fab-icon {
    writing-mode: horizontal-tb;
    font-size: 22px;
  }
  /* 抽屉打开时把按钮推到抽屉左边 */
  #fab.shifted {
    right: 33.33vw;
  }

  /* ===== 抽屉面板 ===== */
  #drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 33.33vw;
    min-width: 360px;
    height: 100vh;
    z-index: 1000;
    background: #fff;
    box-shadow: -4px 0 24px rgba(0,0,0,.18);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
  }
  #drawer.open {
    transform: translateX(0);
  }

  /* --- 抽屉头部 --- */
  .drawer-header {
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .drawer-header .avatar {
    width: 38px; height: 38px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .drawer-header .info { flex: 1; }
  .drawer-header .info h1 { font-size: 15px; font-weight: 600; }
  .drawer-header .info p  { font-size: 12px; opacity: .8; }
  .drawer-header .close-btn {
    width: 32px; height: 32px;
    background: rgba(255,255,255,.15);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .drawer-header .close-btn:hover { background: rgba(255,255,255,.3); }

  /* --- 聊天区 --- */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #f7f8fa;
  }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 90%;
    animation: fadeIn .3s ease;
  }
  .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot   { align-self: flex-start; }

  .msg .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .msg.user .bubble {
    background: #1a73e8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #fff;
    color: #1f1f1f;
    border-bottom-left-radius: 4px;
  }

  .msg .icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg.user .icon { background: #e3f2fd; }
  .msg.bot  .icon { background: #e8f5e9; }

  /* Markdown 表格 */
  .bubble table { border-collapse: collapse; margin: 6px 0; font-size: 12px; width: 100%; }
  .bubble th, .bubble td { border: 1px solid #e0e0e0; padding: 5px 8px; text-align: left; white-space: nowrap; }
  .bubble th { background: #f5f5f5; font-weight: 600; }
  .bubble tr:nth-child(even) { background: #fafafa; }
  .bubble p { margin: 3px 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 3px 0; }
  .bubble code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .bubble pre { background: #f5f5f5; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble strong { font-weight: 600; }
  .bubble h1,.bubble h2,.bubble h3,.bubble h4 { margin: 6px 0 3px; font-size: 14px; }

  /* 快捷提问 */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 14px 8px;
    flex-shrink: 0;
    background: #f7f8fa;
  }
  .suggestions button {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 16px;
    padding: 6px 12px;
    font-size: 12px;
    color: #1a73e8;
    cursor: pointer;
    transition: all .2s;
  }
  .suggestions button:hover {
    background: #e8f0fe;
    border-color: #1a73e8;
  }

  /* 输入区 */
  .input-area {
    padding: 10px 14px;
    background: #fff;
    border-top: 1px solid #e8e8e8;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid #d0d7de;
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 13px;
    resize: none;
    outline: none;
    font-family: inherit;
    max-height: 100px;
    line-height: 1.4;
  }
  .input-area textarea:focus { border-color: #1a73e8; }
  .input-area button {
    width: 38px; height: 38px;
    border: none;
    background: #1a73e8;
    color: #fff;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    flex-shrink: 0;
  }
  .input-area button:hover { background: #1557b0; }
  .input-area button:disabled { background: #bbb; cursor: not-allowed; }

  /* ===== 语音按钮 ===== */
  #micBtn {
    width: 38px; height: 38px;
    border: none;
    background: #34a853;
    color: #fff;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .25s ease;
    flex-shrink: 0;
    position: relative;
  }
  #micBtn:hover { background: #2d8e47; }
  #micBtn.recording {
    background: #ea4335;
    animation: micPulse 1s ease-in-out infinite;
  }
  #micBtn.loading {
    background: #fbbc04;
    cursor: wait;
  }
  #micBtn.disabled-mic {
    background: #bbb;
    cursor: not-allowed;
  }
  @keyframes micPulse {
    0%   { box-shadow: 0 0 0 0 rgba(234,67,53,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(234,67,53,0); }
    100% { box-shadow: 0 0 0 0 rgba(234,67,53,0); }
  }

  /* ===== SenseVoice 云端语音按钮 ===== */
  #senseVoiceBtn {
    width: 38px; height: 38px;
    border: none;
    background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
    color: #fff;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .25s ease;
    flex-shrink: 0;
    position: relative;
  }
  #senseVoiceBtn:hover { background: linear-gradient(135deg, #1557b0 0%, #1a73e8 100%); }
  #senseVoiceBtn.recording {
    background: #ea4335;
    animation: senseVoicePulse 1s ease-in-out infinite;
  }
  #senseVoiceBtn.loading {
    background: #fbbc04;
    cursor: wait;
  }
  #senseVoiceBtn.disabled-mic {
    background: #bbb;
    cursor: not-allowed;
  }
  @keyframes senseVoicePulse {
    0%   { box-shadow: 0 0 0 0 rgba(26,115,232,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(26,115,232,0); }
    100% { box-shadow: 0 0 0 0 rgba(26,115,232,0); }
  }

  /* 语音状态提示 */
  .voice-status {
    padding: 4px 14px;
    background: #fff;
    font-size: 11px;
    color: #666;
    text-align: center;
    flex-shrink: 0;
    display: none;
  }
  .voice-status.visible { display: block; }
  .voice-status .progress-bar {
    height: 3px;
    background: #e0e0e0;
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .voice-status .progress-bar .progress-fill {
    height: 100%;
    background: #1a73e8;
    border-radius: 2px;
    transition: width .3s;
    width: 0%;
  }

  /* 打字动画 */
  .typing .dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: #999;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce .6s infinite alternate;
  }
  .typing .dot:nth-child(2) { animation-delay: .2s; }
  .typing .dot:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce { to { transform: translateY(-5px); opacity: .4; } }
  @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* SQL 折叠 */
  details { margin-top: 6px; }
  details summary { cursor: pointer; font-size: 11px; color: #666; user-select: none; }
  details pre { margin-top: 4px; font-size: 11px; }

  /* ===== 视频播放器（聊天框内嵌） ===== */
  .msg .bubble .video-embed {
    margin: 10px 0;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    position: relative;
  }
  .msg .bubble .video-embed video {
    display: block;
    width: 100%;
    max-height: 300px;
    cursor: pointer;
  }
  .msg .bubble .video-embed .video-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity .2s;
  }
  .msg .bubble .video-embed .video-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .msg .bubble .video-embed .play-icon {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 2px 10px rgba(0,0,0,.3);
  }
  .msg .bubble .video-embed .video-title-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
    padding: 30px 10px 8px;
    color: #fff;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .msg .bubble .video-embed .video-title-bar .title-info {
    flex: 1;
  }
  .msg .bubble .video-embed .video-title-bar .fullscreen-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background .2s;
  }
  .msg .bubble .video-embed .video-title-bar .fullscreen-btn:hover {
    background: rgba(255,255,255,0.4);
  }
  .msg .bubble .video-embed:hover .video-overlay {
    background: rgba(0,0,0,.5);
  }

  /* ===== 图片展示 ===== */
  .msg .bubble .image-preview {
    margin: 10px 0;
    text-align: center;
  }
  .msg .bubble .image-preview img {
    max-width: 100%;
    border-radius: 8px;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
    cursor: pointer;
    transition: transform .2s;
  }
  .msg .bubble .image-preview img:hover {
    transform: scale(1.02);
  }
  .msg .bubble .image-preview .image-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
  }

  /* ===== 图片查看器 ===== */
  #image-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    z-index: 3000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #image-viewer.visible {
    display: flex;
  }
  #image-viewer img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 4px;
    cursor: pointer;
    transition: transform .3s ease;
  }
  #image-viewer img:hover {
    transform: scale(1.02);
  }
  #image-viewer .close-viewer {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    transition: background .2s;
  }
  #image-viewer .close-viewer:hover {
    background: rgba(255,255,255,.4);
  }
  #image-viewer .hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.6);
    font-size: 12px;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- 遮罩 -->
<div id="overlay" onclick="toggleDrawer()"></div>

<!-- 右侧悬浮按钮 -->
<button id="fab" onclick="toggleDrawer()">
  <span class="fab-icon">🤖</span>智能客服
</button>

<!-- 视频播放器（聊天框内嵌，无弹窗） -->
<!-- 视频直接在chat bubble中播放 -->

<!-- 图片查看器 -->
<div id="image-viewer">
  <button class="close-viewer" onclick="closeImageViewer()">✕</button>
  <iframe id="full-image-frame" src="" style="width:90vw;height:90vh;border:none;" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<!-- 抽屉面板 -->
<div id="drawer">
  <div class="drawer-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h1>智能客服</h1>
      <p>视频监控数据分析助手</p>
    </div>
    <button class="close-btn" onclick="toggleDrawer()">✕</button>
  </div>

  <div id="chat-container">
    <div class="msg bot">
      <div class="icon">🤖</div>
      <div class="bubble">
        你好！我是视频监控平台的智能数据分析助手 👋<br><br>
        你可以问我关于摄像机在线状态、图片质量检测等各种数据统计问题，例如：<br>
        • 各区域摄像机在线率是多少？<br>
        • 离线摄像机 Top 10 是哪些？<br>
        • 图片质量完好率怎么样？
      </div>
    </div>
  </div>

  <div class="suggestions">
    <button onclick="askQuestion(this.textContent)">各区域摄像机在线率排名</button>
    <button onclick="askQuestion(this.textContent)">离线Top10区域</button>
    <button onclick="askQuestion(this.textContent)">视频图片完好率</button>
    <button onclick="askQuestion(this.textContent)">摄像机总数统计</button>
    <button onclick="askQuestion(this.textContent)">我需要查看在线摄像机的视频</button>
    <button onclick="askQuestion(this.textContent)">我需要查看在线摄像机的图片</button>
  </div>

  <div class="voice-status" id="voiceStatus">
    <span id="voiceStatusText">正在加载语音识别模型...</span>
    <div class="progress-bar"><div class="progress-fill" id="voiceProgress"></div></div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入问题，如：某区域下离线Top3的子区域？"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="micBtn" title="语音输入 - 本地Whisper（点击开始/结束录音）">🎙️</button>
    <button id="senseVoiceBtn" title="语音输入 - 本地SenseVoice（点击开始/结束录音）">🎤</button>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
<script>
const drawer   = document.getElementById('drawer');
const overlay  = document.getElementById('overlay');
const fab      = document.getElementById('fab');
const chatEl   = document.getElementById('chat-container');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('sendBtn');

// 图片查看器相关
const imageViewer = document.getElementById('image-viewer');
const fullImageIframe = document.getElementById('full-image-frame');

let isOpen = false;

function toggleDrawer() {
  isOpen = !isOpen;
  drawer.classList.toggle('open', isOpen);
  overlay.classList.toggle('visible', isOpen);
  fab.classList.toggle('shifted', isOpen);
  if (isOpen) inputEl.focus();
}

// 自动调整输入框高度
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

function scrollBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addMsg(role, html, sql) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const icon = document.createElement('div');
  icon.className = 'icon';
  icon.textContent = role === 'user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  if (sql && role === 'bot') {
    const details = document.createElement('details');
    details.innerHTML = `<summary>查看生成的 SQL</summary><pre><code>${escapeHtml(sql)}</code></pre>`;
    bubble.appendChild(details);
  }
  wrap.appendChild(icon);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';
  wrap.innerHTML = `<div class="icon">🤖</div><div class="bubble typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  chatEl.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text) {
  if (typeof marked !== 'undefined') return marked.parse(text);
  return text.replace(/\n/g, '<br>');
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', escapeHtml(q));
  addTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    const data = await res.json();
    removeTyping();
    if (data.answer) {
      // 检查是否有媒体内容（视频/图片）
      if (data.media) {
        const media = data.media;
        let html = data.answer;
        
        if (media.type === 'video') {
          // 动态检测视频MIME类型
          const videoUrl = media.url;
          let videoType = 'video/mp4'; // 默认MP4
          if (videoUrl.endsWith('.flv')) {
            videoType = 'video/x-flv';
          } else if (videoUrl.endsWith('.m3u8')) {
            videoType = 'application/x-mpegURL';
          } else if (videoUrl.endsWith('.webm')) {
            videoType = 'video/webm';
          }
          
          // 视频：内嵌在聊天框中，支持点击播放和双击全屏
          html += `<div class="video-embed">
            <video id="video-${Date.now()}" preload="metadata" crossorigin="anonymous">
              <source src="${videoUrl}" type="${videoType}">
            </video>
            <div class="video-overlay">
              <div class="play-icon">▶</div>
            </div>
            <div class="video-title-bar">
              <span class="title-info">${escapeHtml(media.camera_name)} (ID: ${media.camera_id}) · 点击播放/暂停</span>
              <button class="fullscreen-btn" title="全屏播放">⛶ 全屏</button>
            </div>
          </div>`;
        } else if (media.type === 'image') {
          // 图片：使用iframe加载base64截图API，通过postMessage获取图片数据
          const imageId = 'img-' + Date.now();
          const iframeId = 'iframe-' + Date.now();
          html += `<div class="image-preview" id="${imageId}" data-image-url="${escapeHtml(media.url)}">
            <div class="image-title">🖼️ ${escapeHtml(media.camera_name)} (ID: ${media.camera_id}) · 点击查看大图 · 双击全屏</div>
            <div class="image-wrapper" style="position:relative;cursor:pointer;min-height:200px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;">
              <iframe id="${iframeId}" src="${escapeHtml(media.url)}" style="width:100%;height:350px;border:1px solid #ddd;border-radius:8px;background:#1a1a1a;" sandbox="allow-scripts allow-same-origin" onload="console.log('[iframe加载完成]');this.style.display='block';"></iframe>
            </div>
            <p class="loading-hint" style="font-size:11px;color:#999;margin-top:4px;">⏳ 正在截取视频画面...</p>
          </div>`;
        }
        
        addMsg('bot', renderMd(html), data.sql);
        
        // 为视频和图片添加事件处理
        setTimeout(() => {
          if (media.type === 'video') {
            initChatVideos();
          }
          if (media.type === 'image') {
            setupImageClickHandlers();
          }
        }, 100);
      } else {
        // 普通文本回答
        addMsg('bot', renderMd(data.answer), data.sql);
      }
    } else {
      addMsg('bot', '抱歉，暂时无法回答该问题，请稍后重试。');
    }
  } catch (e) {
    removeTyping();
    addMsg('bot', '⚠️ 网络错误，请检查服务是否启动。');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function askQuestion(q) {
  inputEl.value = q;
  send();
}

// ========== 视频播放功能（聊天框内嵌） ==========
function setupInlineVideo(videoContainer, videoUrl) {
  const video = videoContainer.querySelector('video');
  const overlay = videoContainer.querySelector('.video-overlay');
  
  // 点击播放/暂停
  video.addEventListener('click', function() {
    if (video.paused) {
      playInlineVideo(video, videoUrl);
    } else {
      video.pause();
    }
  });
  
  // 点击遮罩层播放
  overlay.addEventListener('click', function() {
    playInlineVideo(video, videoUrl);
  });
  
  // 视频播放后隐藏遮罩
  video.addEventListener('play', function() {
    overlay.classList.add('hidden');
  });
  
  // 视频暂停显示遮罩
  video.addEventListener('pause', function() {
    overlay.classList.remove('hidden');
  });
  
  // 点击全屏按钮进入全屏
  const fullscreenBtn = videoContainer.querySelector('.fullscreen-btn');
  if (fullscreenBtn) {
    fullscreenBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFullscreen(video);
    });
  }
  
  // 双击视频也可以进入全屏（备用方式）
  video.addEventListener('dblclick', function() {
    toggleFullscreen(video);
  });
  
  // 监听全屏变化事件，更新UI状态
  video.addEventListener('fullscreenchange', function() {
    updateFullscreenUI(video);
  });
  video.addEventListener('webkitfullscreenchange', function() {
    updateFullscreenUI(video);
  });
  video.addEventListener('mozfullscreenchange', function() {
    updateFullscreenUI(video);
  });
  video.addEventListener('MSFullscreenChange', function() {
    updateFullscreenUI(video);
  });
}

function toggleFullscreen(video) {
  // 检查是否已经处于全屏状态
  const isFullscreen = document.fullscreenElement || 
                       document.webkitFullscreenElement || 
                       document.mozFullScreenElement || 
                       document.msFullscreenElement;
  
  if (isFullscreen) {
    // 退出全屏
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.mozCancelFullScreen) {
      document.mozCancelFullScreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
  } else {
    // 进入全屏
    if (video.requestFullscreen) {
      video.requestFullscreen();
    } else if (video.webkitRequestFullscreen) {
      video.webkitRequestFullscreen();
    } else if (video.mozRequestFullScreen) {
      video.mozRequestFullScreen();
    } else if (video.msRequestFullscreen) {
      video.msRequestFullscreen();
    }
  }
}

function updateFullscreenUI(video) {
  const isFullscreen = document.fullscreenElement || 
                       document.webkitFullscreenElement || 
                       document.mozFullScreenElement || 
                       document.msFullscreenElement;
  
  const container = video.closest('.video-embed');
  const titleBar = container.querySelector('.video-title-bar');
  const fullscreenBtn = container.querySelector('.fullscreen-btn');
  
  if (isFullscreen) {
    // 全屏时隐藏标题栏，显示在外部
    if (titleBar) {
      titleBar.style.display = 'none';
    }
    // 更新按钮文字
    if (fullscreenBtn) {
      fullscreenBtn.textContent = '⛶ 退出';
    }
  } else {
    // 退出全屏时恢复标题栏
    if (titleBar) {
      titleBar.style.display = '';
    }
    // 恢复按钮文字
    if (fullscreenBtn) {
      fullscreenBtn.textContent = '⛶ 全屏';
    }
  }
}

function playInlineVideo(video, videoUrl) {
  // 检查是否支持FLV并根据URL后缀选择播放方式
  const isFlv = videoUrl.endsWith('.flv');
  const isM3u8 = videoUrl.endsWith('.m3u8');
  
  if (flvjs.isSupported() && isFlv) {
    // 使用flv.js播放FLV
    const parentContainer = video.closest('.video-embed');
    let player = parentContainer._flvPlayer;
    
    if (!player) {
      player = flvjs.createPlayer({
        type: 'flv',
        url: videoUrl
      }, {
        enableWorker: true,
        enableStashBuffer: false,
        stashInitialSize: 128
      });
      player.attachMediaElement(video);
      player.load();
      parentContainer._flvPlayer = player;
    }
    player.play();
  } else if (isM3u8 && typeof Hls !== 'undefined' && Hls.isSupported()) {
    // 使用Hls.js播放HLS
    const parentContainer = video.closest('.video-embed');
    let hls = parentContainer._hlsPlayer;
    
    if (!hls) {
      hls = new Hls();
      hls.loadSource(videoUrl);
      hls.attachMedia(video);
      parentContainer._hlsPlayer = hls;
    }
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
    });
  } else {
    // 其他格式（MP4, WebM等）直接使用原生video播放
    video.play();
  }
}

// 初始化聊天中已有的视频
function initChatVideos() {
  document.querySelectorAll('.msg .bubble .video-embed').forEach(container => {
    const video = container.querySelector('video');
    const source = container.querySelector('source');
    if (video && source) {
      setupInlineVideo(container, source.src);
    }
  });
}

// ========== Whisper Web 语音识别集成 ==========

const micBtn        = document.getElementById('micBtn');
const voiceStatusEl = document.getElementById('voiceStatus');
const voiceStatusText = document.getElementById('voiceStatusText');
const voiceProgress = document.getElementById('voiceProgress');

let whisperWorker   = null;   // Web Worker 实例
let whisperReady    = false;  // 模型是否已加载完毕
let isRecording     = false;  // 当前是否录音中
let mediaRecorder   = null;   // MediaRecorder 实例
let audioChunks     = [];     // 录音 Blob 切片
let audioStream     = null;   // 麦克风 MediaStream

/**
 * 初始化 Whisper Worker（页面加载后延迟执行，不占主线程）
 */
function initWhisperWorker() {
  try {
    whisperWorker = new Worker('/static/whisper_worker.js', { type: 'module' });
  } catch (err) {
    console.warn('[Whisper] Worker 创建失败:', err);
    micBtn.classList.add('disabled-mic');
    micBtn.title = '当前浏览器不支持语音识别';
    return;
  }

  whisperWorker.addEventListener('message', (e) => {
    const msg = e.data;
    switch (msg.type) {
      case 'status':
        handleWorkerStatus(msg);
        break;
      case 'ready':
        whisperReady = true;
        micBtn.classList.remove('loading');
        micBtn.title = '语音输入（点击开始录音）';
        voiceStatusEl.classList.remove('visible');
        console.log(`[Whisper] 模型 ${msg.modelId || ''} 加载完成，可以开始语音输入`);
        break;
      case 'result':
        handleTranscriptionResult(msg.text);
        break;
      case 'error':
        console.error('[Whisper] Worker 错误:', msg.message);
        resetRecordingState();
        voiceStatusText.textContent = '⚠️ ' + msg.message;
        voiceStatusEl.classList.add('visible');
        setTimeout(() => voiceStatusEl.classList.remove('visible'), 3000);
        break;
    }
  });

  // 静默预加载：延迟 3 秒执行，让首屏业务请求先完成
  setTimeout(() => {
    console.log('[Whisper] 开始静默预加载模型...');
    micBtn.classList.add('loading');
    micBtn.title = '语音模型加载中...';
    whisperWorker.postMessage({ type: 'load' });
  }, 3000);
}

/**
 * 处理 Worker 发回的状态消息
 */
function handleWorkerStatus(msg) {
  if (msg.status === 'downloading') {
    const pct = msg.progress || 0;
    voiceStatusText.textContent = `正在下载语音模型... ${pct}%`;
    voiceProgress.style.width = pct + '%';
    voiceStatusEl.classList.add('visible');
  } else if (msg.status === 'loading') {
    voiceStatusText.textContent = '正在初始化模型...';
    voiceProgress.style.width = '100%';
  } else if (msg.status === 'transcribing') {
    voiceStatusText.textContent = '🧠 正在识别语音...';
    voiceProgress.style.width = '100%';
    voiceStatusEl.classList.add('visible');
  }
}

/**
 * 处理识别结果
 */
function handleTranscriptionResult(text) {
  resetRecordingState();
  voiceStatusEl.classList.remove('visible');

  if (text) {
    // 将识别文字填入输入框
    inputEl.value = text;
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    inputEl.focus();
    console.log('[Whisper] 识别结果:', text);
  } else {
    voiceStatusText.textContent = '未检测到有效语音，请重试';
    voiceStatusEl.classList.add('visible');
    setTimeout(() => voiceStatusEl.classList.remove('visible'), 2500);
  }
}

/**
 * 重置录音相关状态
 */
function resetRecordingState() {
  isRecording = false;
  micBtn.classList.remove('recording');
  micBtn.classList.remove('loading');
  micBtn.title = '语音输入（点击开始录音）';
  if (audioStream) {
    audioStream.getTracks().forEach(t => t.stop());
    audioStream = null;
  }
}

/**
 * 开始录音
 */
async function startRecording() {
  if (!whisperReady) {
    voiceStatusText.textContent = '⏳ 语音模型仍在加载中，请稍候...';
    voiceStatusEl.classList.add('visible');
    setTimeout(() => voiceStatusEl.classList.remove('visible'), 2500);
    return;
  }

  try {
    audioStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        sampleRate: 16000,
        echoCancellation: true,
        noiseSuppression: true,
      }
    });
  } catch (err) {
    console.error('[Whisper] 麦克风权限被拒绝:', err);
    voiceStatusText.textContent = '⚠️ 需要麦克风权限才能使用语音输入';
    voiceStatusEl.classList.add('visible');
    setTimeout(() => voiceStatusEl.classList.remove('visible'), 3000);
    return;
  }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(audioStream, { mimeType: getSupportedMimeType() });

  mediaRecorder.addEventListener('dataavailable', (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  });

  mediaRecorder.addEventListener('stop', async () => {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    console.log('[Whisper] 录音结束，Blob大小:', blob.size, '类型:', blob.type);
    await processAudioBlob(blob);
  });

  mediaRecorder.start();
  isRecording = true;
  micBtn.classList.add('recording');
  micBtn.title = '正在录音中，点击结束';
  voiceStatusText.textContent = '🎙️ 正在录音，点击麦克风停止...';
  voiceStatusEl.classList.add('visible');
  console.log('[Whisper] 开始录音');
}

/**
 * 停止录音
 */
function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  micBtn.classList.remove('recording');
  micBtn.classList.add('loading');
  micBtn.title = '正在识别...';
  voiceStatusText.textContent = '🧠 正在识别语音，请稍候...';
  console.log('[Whisper] 停止录音，等待处理');
}

/**
 * 获取浏览器支持的录音格式
 */
function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
  for (const type of types) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }
  return ''; // 让浏览器自行选择
}

/**
 * 将录音 Blob 转换为 16kHz Float32 PCM 并发送给 Worker
 */
async function processAudioBlob(blob) {
  try {
    const arrayBuffer = await blob.arrayBuffer();
    // 使用 AudioContext 解码并重采样
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    // 提取单声道 Float32 数据
    const float32 = audioBuffer.getChannelData(0);
    console.log('[Whisper] PCM 数据长度:', float32.length, '采样率:', audioBuffer.sampleRate);

    // 如果数据过短（不到 0.5 秒），提示用户
    if (float32.length < 8000) {
      voiceStatusText.textContent = '录音太短了，请说长一点';
      voiceStatusEl.classList.add('visible');
      resetRecordingState();
      micBtn.classList.remove('loading');
      setTimeout(() => voiceStatusEl.classList.remove('visible'), 2500);
      audioCtx.close();
      return;
    }

    // 将数据发给 Worker 进行推理
    whisperWorker.postMessage(
      { type: 'transcribe', audio: float32 },
      [float32.buffer] // Transfer 所有权，避免拷贝（零拷贝）
    );

    audioCtx.close();
  } catch (err) {
    console.error('[Whisper] 音频处理失败:', err);
    voiceStatusText.textContent = '⚠️ 音频处理失败: ' + err.message;
    voiceStatusEl.classList.add('visible');
    resetRecordingState();
    micBtn.classList.remove('loading');
    setTimeout(() => voiceStatusEl.classList.remove('visible'), 3000);
  }
}

// -------- 麦克风按钮点击事件 --------
micBtn.addEventListener('click', () => {
  if (micBtn.classList.contains('disabled-mic')) return;

  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

    const blob = new Blob(senseVoiceAudioChunks, { type: senseVoiceMediaRecorder.mimeType });
    console.log('[SenseVoice] 录音结束，Blob大小:', blob.size, '类型:', blob.type);
    await processSenseVoiceAudio(blob);
  });

  senseVoiceMediaRecorder.start();
  isSenseVoiceRecording = true;
  senseVoiceBtn.classList.add('recording');
  senseVoiceBtn.title = '正在录音中，点击停止';
  voiceStatusText.textContent = '🎤 正在录音 (SenseVoice)，点击按钮停止...';
  voiceStatusEl.classList.add('visible');
  console.log('[SenseVoice] 开始录音');
}

/**
 * 停止 SenseVoice 录音
 */
function stopSenseVoiceRecording() {
  if (senseVoiceMediaRecorder && senseVoiceMediaRecorder.state !== 'inactive') {
    senseVoiceMediaRecorder.stop();
  }
  senseVoiceBtn.classList.remove('recording');
  senseVoiceBtn.classList.add('loading');
  senseVoiceBtn.title = '正在识别...';
  voiceStatusText.textContent = '☁️ 正在云端识别，请稍候...';
  console.log('[SenseVoice] 停止录音，等待处理');
}

/**
 * 处理 SenseVoice 音频并发送到后端
 */
async function processSenseVoiceAudio(blob) {
  try {
    // 创建 FormData
    const formData = new FormData();
    
    // 根据 blob 类型选择正确的文件扩展名
    let filename = 'recording';
    let mimeType = blob.type || 'audio/webm';
    
    if (mimeType.includes('webm')) {
      filename += '.webm';
    } else if (mimeType.includes('mp4')) {
      filename += '.mp4';
    } else if (mimeType.includes('ogg')) {
      filename += '.ogg';
    } else if (mimeType.includes('wav')) {
      filename += '.wav';
    } else if (mimeType.includes('mp3') || mimeType.includes('mpeg')) {
      filename += '.mp3';
    } else {
      // 默认使用 webm
      filename += '.webm';
      mimeType = 'audio/webm';
    }
    
    console.log('[SenseVoice] 发送音频:', filename, '类型:', mimeType, '大小:', blob.size);
    formData.append('audio', blob, filename);

    // 发送请求
    const response = await fetch('/api/sensevoice/transcribe', {
      method: 'POST',
      body: formData,
    });

    const data = await response.json();

    if (data.success && data.text) {
      // 将识别文字填入输入框
      inputEl.value = data.text;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
      inputEl.focus();
      console.log('[SenseVoice] 识别结果:', data.text);
    } else {
      voiceStatusText.textContent = '⚠️ ' + (data.error || '识别失败，请重试');
      voiceStatusEl.classList.add('visible');
      setTimeout(() => voiceStatusEl.classList.remove('visible'), 3000);
    }
  } catch (err) {
    console.error('[SenseVoice] 上传失败:', err);
    voiceStatusText.textContent = '⚠️ 网络错误，请检查服务是否启动';
    voiceStatusEl.classList.add('visible');
    setTimeout(() => voiceStatusEl.classList.remove('visible'), 3000);
  } finally {
    resetSenseVoiceRecordingState();
  }
}

/**
 * 重置 SenseVoice 录音状态
 */
function resetSenseVoiceRecordingState() {
  isSenseVoiceRecording = false;
  senseVoiceBtn.classList.remove('recording');
  senseVoiceBtn.classList.remove('loading');
  senseVoiceBtn.title = '语音输入 - 云端SenseVoice（点击开始/结束录音）';
  voiceStatusEl.classList.remove('visible');
  if (senseVoiceAudioStream) {
    senseVoiceAudioStream.getTracks().forEach(t => t.stop());
    senseVoiceAudioStream = null;
  }
}

// -------- SenseVoice 按钮点击事件 --------
senseVoiceBtn.addEventListener('click', () => {
  if (senseVoiceBtn.classList.contains('disabled-mic')) return;

  if (isSenseVoiceRecording) {
    stopSenseVoiceRecording();
  } else {
    startSenseVoiceRecording();
  }
});

// -------- 页面加载完成后启动预加载 --------
if (window.Worker) {
  initWhisperWorker();
} else {
  console.warn('[Whisper] 浏览器不支持 Web Worker');
  micBtn.classList.add('disabled-mic');
  micBtn.title = '当前浏览器不支持语音识别';
}

</script>
</body>
</html>
