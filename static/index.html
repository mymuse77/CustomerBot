<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频监控平台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: #e8eaed;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== 遮罩层 ===== */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  #overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* ===== 右侧悬浮按钮 ===== */
  #fab {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 800;
    writing-mode: vertical-lr;
    letter-spacing: 4px;
    background: linear-gradient(180deg, #1a73e8 0%, #0d47a1 100%);
    color: #fff;
    border: none;
    border-radius: 8px 0 0 8px;
    padding: 18px 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: -2px 2px 12px rgba(0,0,0,.2);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: right .35s cubic-bezier(.4,0,.2,1), box-shadow .2s;
  }
  #fab:hover {
    box-shadow: -4px 4px 20px rgba(0,0,0,.3);
  }
  #fab .fab-icon {
    writing-mode: horizontal-tb;
    font-size: 22px;
  }
  /* 抽屉打开时把按钮推到抽屉左边 */
  #fab.shifted {
    right: 33.33vw;
  }

  /* ===== 抽屉面板 ===== */
  #drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 33.33vw;
    min-width: 360px;
    height: 100vh;
    z-index: 1000;
    background: #fff;
    box-shadow: -4px 0 24px rgba(0,0,0,.18);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
  }
  #drawer.open {
    transform: translateX(0);
  }

  /* --- 抽屉头部 --- */
  .drawer-header {
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .drawer-header .avatar {
    width: 38px; height: 38px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .drawer-header .info { flex: 1; }
  .drawer-header .info h1 { font-size: 15px; font-weight: 600; }
  .drawer-header .info p  { font-size: 12px; opacity: .8; }
  .drawer-header .close-btn {
    width: 32px; height: 32px;
    background: rgba(255,255,255,.15);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .drawer-header .close-btn:hover { background: rgba(255,255,255,.3); }

  /* --- 聊天区 --- */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #f7f8fa;
  }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 90%;
    animation: fadeIn .3s ease;
  }
  .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot   { align-self: flex-start; }

  .msg .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .msg.user .bubble {
    background: #1a73e8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #fff;
    color: #1f1f1f;
    border-bottom-left-radius: 4px;
  }

  .msg .icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg.user .icon { background: #e3f2fd; }
  .msg.bot  .icon { background: #e8f5e9; }

  /* Markdown 表格 */
  .bubble table { border-collapse: collapse; margin: 6px 0; font-size: 12px; width: 100%; }
  .bubble th, .bubble td { border: 1px solid #e0e0e0; padding: 5px 8px; text-align: left; white-space: nowrap; }
  .bubble th { background: #f5f5f5; font-weight: 600; }
  .bubble tr:nth-child(even) { background: #fafafa; }
  .bubble p { margin: 3px 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 3px 0; }
  .bubble code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .bubble pre { background: #f5f5f5; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble strong { font-weight: 600; }
  .bubble h1,.bubble h2,.bubble h3,.bubble h4 { margin: 6px 0 3px; font-size: 14px; }

  /* 快捷提问 */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 14px 8px;
    flex-shrink: 0;
    background: #f7f8fa;
  }
  .suggestions button {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 16px;
    padding: 6px 12px;
    font-size: 12px;
    color: #1a73e8;
    cursor: pointer;
    transition: all .2s;
  }
  .suggestions button:hover {
    background: #e8f0fe;
    border-color: #1a73e8;
  }

  /* 输入区 */
  .input-area {
    padding: 10px 14px;
    background: #fff;
    border-top: 1px solid #e8e8e8;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid #d0d7de;
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 13px;
    resize: none;
    outline: none;
    font-family: inherit;
    max-height: 100px;
    line-height: 1.4;
  }
  .input-area textarea:focus { border-color: #1a73e8; }
  .input-area button {
    width: 38px; height: 38px;
    border: none;
    background: #1a73e8;
    color: #fff;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    flex-shrink: 0;
  }
  .input-area button:hover { background: #1557b0; }
  .input-area button:disabled { background: #bbb; cursor: not-allowed; }

  /* 打字动画 */
  .typing .dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: #999;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce .6s infinite alternate;
  }
  .typing .dot:nth-child(2) { animation-delay: .2s; }
  .typing .dot:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce { to { transform: translateY(-5px); opacity: .4; } }
  @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* SQL 折叠 */
  details { margin-top: 6px; }
  details summary { cursor: pointer; font-size: 11px; color: #666; user-select: none; }
  details pre { margin-top: 4px; font-size: 11px; }
</style>
</head>
<body>

<!-- 遮罩 -->
<div id="overlay" onclick="toggleDrawer()"></div>

<!-- 右侧悬浮按钮 -->
<button id="fab" onclick="toggleDrawer()">
  <span class="fab-icon">🤖</span>智能客服
</button>

<!-- 抽屉面板 -->
<div id="drawer">
  <div class="drawer-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h1>智能客服</h1>
      <p>视频监控数据分析助手</p>
    </div>
    <button class="close-btn" onclick="toggleDrawer()">✕</button>
  </div>

  <div id="chat-container">
    <div class="msg bot">
      <div class="icon">🤖</div>
      <div class="bubble">
        你好！我是视频监控平台的智能数据分析助手 👋<br><br>
        你可以问我关于摄像机在线状态、图片质量检测等各种数据统计问题，例如：<br>
        • 各区域摄像机在线率是多少？<br>
        • 离线摄像机 Top 10 是哪些？<br>
        • 图片质量完好率怎么样？
      </div>
    </div>
  </div>

  <div class="suggestions">
    <button onclick="askQuestion(this.textContent)">各区域摄像机在线率排名</button>
    <button onclick="askQuestion(this.textContent)">离线Top10区域</button>
    <button onclick="askQuestion(this.textContent)">视频图片完好率</button>
    <button onclick="askQuestion(this.textContent)">摄像机总数统计</button>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入问题，如：某区域下离线Top3的子区域？"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const drawer   = document.getElementById('drawer');
const overlay  = document.getElementById('overlay');
const fab      = document.getElementById('fab');
const chatEl   = document.getElementById('chat-container');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('sendBtn');

let isOpen = false;

function toggleDrawer() {
  isOpen = !isOpen;
  drawer.classList.toggle('open', isOpen);
  overlay.classList.toggle('visible', isOpen);
  fab.classList.toggle('shifted', isOpen);
  if (isOpen) inputEl.focus();
}

// 自动调整输入框高度
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

function scrollBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addMsg(role, html, sql) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const icon = document.createElement('div');
  icon.className = 'icon';
  icon.textContent = role === 'user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  if (sql && role === 'bot') {
    const details = document.createElement('details');
    details.innerHTML = `<summary>查看生成的 SQL</summary><pre><code>${escapeHtml(sql)}</code></pre>`;
    bubble.appendChild(details);
  }
  wrap.appendChild(icon);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';
  wrap.innerHTML = `<div class="icon">🤖</div><div class="bubble typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  chatEl.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text) {
  if (typeof marked !== 'undefined') return marked.parse(text);
  return text.replace(/\n/g, '<br>');
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', escapeHtml(q));
  addTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    const data = await res.json();
    removeTyping();
    if (data.answer) {
      addMsg('bot', renderMd(data.answer), data.sql);
    } else {
      addMsg('bot', '抱歉，暂时无法回答该问题，请稍后重试。');
    }
  } catch (e) {
    removeTyping();
    addMsg('bot', '⚠️ 网络错误，请检查服务是否启动。');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function askQuestion(q) {
  inputEl.value = q;
  send();
}
</script>
</body>
</html>
